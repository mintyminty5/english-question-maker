<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2022 개정 영어 성취기준 평가발문기</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: #f5f0eb; }

        .scrollbar::-webkit-scrollbar { width: 6px; }
        .scrollbar::-webkit-scrollbar-track { background: transparent; }
        .scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

        .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Header */
        .header { background: #065f46; color: #fff; padding: 14px 20px; box-shadow: 0 2px 6px rgba(0,0,0,.15); flex-shrink: 0; }
        .header-inner { max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 8px; }
        .header h1 { font-size: 16px; font-weight: 700; }
        .header p  { font-size: 11px; opacity: .8; margin-top: 2px; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .header-count { font-size: 10px; background: rgba(0,0,0,.25); padding: 3px 8px; border-radius: 4px; color: #d1fae5; }
        .btn-cart { position: relative; display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25); color: #fff; font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: background .15s; }
        .btn-cart:hover { background: rgba(255,255,255,.22); }
        .cart-badge { position: absolute; top: -7px; right: -7px; background: #facc15; color: #713f12; font-size: 9px; font-weight: 900; width: 17px; height: 17px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* Body */
        .body { display: flex; flex: 1; overflow: hidden; max-width: 1200px; width: 100%; margin: 0 auto; }

        /* Sidebar */
        .sidebar { width: 272px; flex-shrink: 0; background: #fff; border-right: 1px solid #e5e7eb; padding: 14px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        @media (max-width: 768px) { .sidebar { display: none; } }
        .sidebar input { width: 100%; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; background: #fafaf9; outline: none; transition: box-shadow .15s; font-family: inherit; }
        .sidebar input:focus { box-shadow: 0 0 0 2px #6ee7b7; border-color: #6ee7b7; }
        .s-label { font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .07em; padding: 0 2px; margin-bottom: 5px; }
        .filter-btn { width: 100%; text-align: left; padding: 7px 10px; border-radius: 8px; font-size: 13px; background: transparent; border: none; cursor: pointer; color: #4b5563; transition: background .12s; font-family: inherit; }
        .filter-btn:hover { background: #f3f4f6; }
        .filter-btn.active { background: #d1fae5; color: #065f46; font-weight: 700; }
        .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .level-btn { display: flex; align-items: center; gap: 6px; padding: 7px 10px; border-radius: 8px; font-size: 13px; background: #f9fafb; border: none; cursor: pointer; color: #4b5563; transition: all .12s; font-family: inherit; }
        .level-btn:hover { background: #f3f4f6; }
        .level-btn.active { background: #d1fae5; color: #065f46; font-weight: 700; box-shadow: 0 0 0 1px #6ee7b7; }
        .level-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .std-list { flex: 1; overflow-y: auto; }
        .std-btn { width: 100%; text-align: left; padding: 9px 10px; border-radius: 8px; border: 1px solid transparent; background: transparent; cursor: pointer; margin-bottom: 3px; transition: all .12s; font-family: inherit; }
        .std-btn:hover { background: #f9fafb; }
        .std-btn.active { background: #fff; border-color: #059669; box-shadow: 0 0 0 1px #059669; }
        .std-btn-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
        .std-code { font-family: monospace; font-size: 11px; font-weight: 700; color: #059669; }
        .std-cnt { font-size: 9px; padding: 1px 5px; border-radius: 10px; }
        .std-cnt.normal { background: #d1fae5; color: #065f46; }
        .std-cnt.support { background: #ffedd5; color: #9a3412; }
        .std-title-sm { font-size: 11px; color: #6b7280; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Main */
        .main { flex: 1; padding: 24px 28px; overflow-y: auto; background: #f5f0eb; }
        @media (max-width: 768px) { .main { padding: 14px; background: #fff; } }
        .mobile-filters { display: none; gap: 8px; margin-bottom: 14px; overflow-x: auto; }
        @media (max-width: 768px) { .mobile-filters { display: flex; } }
        .mobile-filters select { padding: 7px 10px; background: #fff; border: 1px solid #d1d5db; border-radius: 8px; font-size: 12px; outline: none; font-family: inherit; }

        /* Empty state */
        .empty-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 20px; background: #fff; border-radius: 20px; border: 2px dashed #e5e7eb; }
        .empty-state .e-icon { font-size: 52px; margin-bottom: 16px; }
        .empty-state h2 { font-size: 18px; font-weight: 700; color: #374151; margin-bottom: 6px; }
        .empty-state p  { font-size: 13px; color: #9ca3af; max-width: 280px; line-height: 1.6; }

        /* Content */
        .content { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .info-card { background: #fff; border-radius: 16px; padding: 20px 22px; box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 1px solid #e5e7eb; }
        .info-code-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .code-chip { background: #065f46; color: #fff; padding: 3px 10px; border-radius: 20px; font-family: monospace; font-size: 11px; font-weight: 700; }
        .domain-chip { font-size: 11px; font-weight: 700; color: #065f46; text-transform: uppercase; letter-spacing: .05em; }
        .info-title { font-size: 18px; font-weight: 700; color: #1f2937; margin-bottom: 14px; line-height: 1.4; }
        .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { display: flex; align-items: center; gap: 6px; background: #f5f0eb; padding: 6px 10px; border-radius: 8px; }
        .chip-label { font-size: 10px; color: #9ca3af; font-weight: 700; line-height: 1; margin-bottom: 2px; }
        .chip-value { font-size: 11px; font-weight: 600; color: #374151; }
        .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .section-title { font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .08em; white-space: nowrap; }
        .section-line { flex: 1; height: 1px; background: #e5e7eb; }
        .section-count { font-size: 11px; font-weight: 700; color: #059669; background: #ecfdf5; padding: 3px 8px; border-radius: 6px; }

        /* Question cards */
        .q-list { display: flex; flex-direction: column; gap: 10px; }
        .q-card { background: #fff; border-radius: 16px; border: 1px solid #f3f4f6; padding: 16px 18px; display: flex; gap: 14px; align-items: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,.04); transition: box-shadow .15s, border-color .15s; }
        .q-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.08); }
        .q-card.saved { border-color: #6ee7b7; }
        .badge { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; font-size: 12px; font-weight: 700; font-family: monospace; flex-shrink: 0; }
        .q-body { flex: 1; }
        .q-type { display: inline-block; font-size: 10px; font-weight: 700; background: #f5f0eb; color: #6b7280; padding: 2px 7px; border-radius: 4px; margin-bottom: 6px; }
        .q-text { font-size: 14px; color: #374151; line-height: 1.6; font-weight: 500; }
        .q-card:hover .q-text { color: #064e3b; }
        .btn-add { flex-shrink: 0; align-self: center; width: 30px; height: 30px; border-radius: 50%; border: 1px solid #e5e7eb; background: #f5f0eb; font-size: 16px; font-weight: 700; color: #9ca3af; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
        .btn-add:hover { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
        .btn-add.saved { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
        .btn-add.saved:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }

        /* Support / no results */
        .support-notice { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 16px; padding: 28px; text-align: center; }
        .support-notice .sn-title { font-size: 13px; font-weight: 700; color: #9a3412; margin-top: 6px; }
        .support-notice .sn-desc  { font-size: 11px; color: rgba(154,52,18,.65); margin-top: 4px; }
        .no-results { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 28px; text-align: center; font-size: 13px; color: #9ca3af; }

        /* Level cards */
        .level-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
        .level-card { background: #fff; border-radius: 16px; border: 1px solid #f3f4f6; padding: 14px 18px; display: flex; gap: 14px; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
        .level-card p { font-size: 13px; color: #4b5563; line-height: 1.6; }
        .footer-space { height: 48px; }

        /* Cart panel */
        .cart-overlay { position: fixed; inset: 0; z-index: 50; display: flex; justify-content: flex-end; background: rgba(0,0,0,.28); }
        .cart-panel { width: 380px; background: #fff; display: flex; flex-direction: column; height: 100%; box-shadow: -4px 0 20px rgba(0,0,0,.12); }
        @media (max-width: 480px) { .cart-panel { width: 100%; } }
        .cart-header { background: #065f46; color: #fff; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .cart-header h2 { font-size: 14px; font-weight: 700; }
        .cart-header p  { font-size: 11px; opacity: .7; margin-top: 2px; }
        .cart-close { background: none; border: none; color: rgba(255,255,255,.6); font-size: 28px; line-height: 1; cursor: pointer; padding: 0 4px; }
        .cart-close:hover { color: #fff; }
        .cart-body { flex: 1; overflow-y: auto; padding: 14px; }
        .cart-empty { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #9ca3af; padding: 40px 20px; }
        .cart-empty .ce-icon { font-size: 42px; margin-bottom: 10px; }
        .cart-empty p { font-size: 13px; color: #6b7280; font-weight: 600; }
        .cart-empty span { font-size: 12px; color: #9ca3af; margin-top: 4px; display: block; }
        .cart-group { border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
        .cart-group-head { background: #f0fdf4; padding: 9px 14px; border-bottom: 1px solid #d1fae5; }
        .cart-group-code  { font-family: monospace; font-size: 11px; font-weight: 700; color: #059669; }
        .cart-group-title { font-size: 11px; color: #6b7280; margin-top: 2px; line-height: 1.4; }
        .cart-q { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-bottom: 1px solid #f3f4f6; }
        .cart-q:last-child { border-bottom: none; }
        .cart-q-body { flex: 1; min-width: 0; }
        .cart-q-type { font-size: 10px; font-weight: 700; background: #e5e7eb; color: #6b7280; padding: 1px 6px; border-radius: 3px; display: inline-block; margin-bottom: 4px; }
        .cart-q-text { font-size: 12px; color: #374151; line-height: 1.5; }
        .btn-remove { background: none; border: none; color: #d1d5db; font-size: 20px; line-height: 1; cursor: pointer; flex-shrink: 0; padding: 0 2px; }
        .btn-remove:hover { color: #ef4444; }
        .cart-footer { padding: 14px; border-top: 1px solid #f3f4f6; flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; }
        .btn-download { width: 100%; background: #065f46; color: #fff; border: none; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: background .15s; font-family: inherit; }
        .btn-download:hover { background: #047857; }
        .btn-clear { width: 100%; background: none; border: none; font-size: 12px; color: #9ca3af; cursor: pointer; padding: 4px; transition: color .15s; font-family: inherit; }
        .btn-clear:hover { color: #ef4444; }
    </style>
</head>
<body>

<div class="app">
    <!-- Header -->
    <div class="header">
        <div class="header-inner">
            <div>
                <h1>2022 개정 영어 성취기준 평가발문기</h1>
                <p>중학교 교육과정 기반 샘플 문항 및 성취수준 가이드</p>
            </div>
            <div class="header-right">
                <span class="header-count" id="totalCount"></span>
                <button class="btn-cart" id="cartBtn">
                    📋 발문함
                    <span class="cart-badge" id="cartBadge" style="display:none">0</span>
                </button>
            </div>
        </div>
    </div>

    <div class="body">
        <!-- Sidebar -->
        <aside class="sidebar scrollbar">
            <input type="text" id="searchInput" placeholder="코드, 키워드 검색...">

            <div>
                <div class="s-label">영역 필터</div>
                <button class="filter-btn active" data-domain="ALL">전체</button>
                <button class="filter-btn" data-domain="이해">이해</button>
                <button class="filter-btn" data-domain="표현">표현</button>
            </div>

            <div>
                <div class="s-label">성취수준</div>
                <div class="level-grid" id="levelBtns"></div>
            </div>

            <div class="std-list scrollbar">
                <div class="s-label">성취기준 목록</div>
                <div id="stdList"></div>
            </div>
        </aside>

        <!-- Main -->
        <main class="main scrollbar" id="main">
            <div class="mobile-filters">
                <select id="mobileStdSelect">
                    <option value="">성취기준 선택...</option>
                </select>
                <select id="mobileLevelSelect">
                    <option value="ALL">전체수준</option>
                    <option value="A">A수준</option>
                    <option value="B">B수준</option>
                    <option value="C">C수준</option>
                    <option value="D">D수준</option>
                    <option value="E">E수준</option>
                </select>
            </div>
            <div id="mainContent"></div>
        </main>
    </div>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cartOverlay" style="display:none">
        <div class="cart-panel">
            <div class="cart-header">
                <div>
                    <h2>📋 내 발문함</h2>
                    <p id="cartCount">0개 발문 선택됨</p>
                </div>
                <button class="cart-close" id="cartClose">×</button>
            </div>
            <div class="cart-body scrollbar" id="cartBody"></div>
            <div class="cart-footer" id="cartFooter" style="display:none">
                <button class="btn-download" id="downloadBtn">⬇️ 문서로 다운로드 (.html)</button>
                <button class="btn-clear" id="clearBtn">전체 비우기</button>
            </div>
        </div>
    </div>
</div>

<script>
const LC = { A:"#e63946", B:"#f4a261", C:"#2a9d8f", D:"#457b9d", E:"#9b72cf" };
const LB = { A:"#fde8e8", B:"#fef3e2", C:"#e0f4f2", D:"#e2edf5", E:"#f0ebfa" };

const STANDARDS = [

// ── State ──
let selectedCode = null;
let levelFilter = "ALL";
let domainFilter = "ALL";
let searchTerm = "";
let savedQuestions = [];

// ── Helpers ──
function makeKey(code, q) { return code + "__" + q.level + "__" + q.text; }
function isSaved(code, q) { return savedQuestions.some(s => s._key === makeKey(code, q)); }

function makeBadge(level) {
    return `<div class="badge" style="background:${LB[level]};color:${LC[level]}">${level}</div>`;
}

function getFiltered() {
    return STANDARDS.filter(s =>
        (domainFilter === "ALL" || s.domain === domainFilter) &&
        (!searchTerm || s.code.includes(searchTerm) || s.title.includes(searchTerm) || s.evalElement.includes(searchTerm))
    );
}

// ── Render Sidebar List ──
function renderStdList() {
    const list = document.getElementById("stdList");
    const filtered = getFiltered();
    list.innerHTML = filtered.map(s => `
        <button class="std-btn ${selectedCode === s.code ? "active" : ""}" data-code="${s.code}">
            <div class="std-btn-top">
                <span class="std-code">${s.code}</span>
                <span class="std-cnt ${s.isSupport ? "support" : "normal"}">${s.isSupport ? "보조" : s.questions.length + "문항"}</span>
            </div>
            <div class="std-title-sm">${s.title}</div>
        </button>
    `).join("");

    list.querySelectorAll(".std-btn").forEach(btn => {
        btn.addEventListener("click", () => { selectedCode = btn.dataset.code; render(); });
    });

    // Mobile select
    const msel = document.getElementById("mobileStdSelect");
    msel.innerHTML = '<option value="">성취기준 선택...</option>' +
        filtered.map(s => `<option value="${s.code}" ${selectedCode === s.code ? "selected" : ""}>${s.code} ${s.title.substring(0,15)}...</option>`).join("");
}

// ── Render Main ──
function renderMain() {
    const el = document.getElementById("mainContent");
    if (!selectedCode) {
        el.innerHTML = `
            <div class="empty-state">
                <div class="e-icon">🔍</div>
                <h2>성취기준을 선택해주세요</h2>
                <p>왼쪽 리스트에서 분석하고자 하는 성취기준을 클릭하면 수준별 샘플 발문과 상세 기술을 확인할 수 있습니다.</p>
            </div>`;
        return;
    }

    const s = STANDARDS.find(x => x.code === selectedCode);
    const displayLevels = levelFilter === "ALL" ? ["A","B","C","D","E"] : [levelFilter];
    const filteredQ = s.questions.filter(q => levelFilter === "ALL" || q.level === levelFilter);

    let qSection = "";
    if (s.isSupport) {
        qSection = `<div class="support-notice">
            <div style="font-size:28px">🔗</div>
            <p class="sn-title">태도 및 전략 기반 성취기준</p>
            <p class="sn-desc">이 기준은 단독 평가보다 다른 인지적 성취기준과 결합하여 과정 중심 평가로 운영하는 것이 권장됩니다.</p>
        </div>`;
    } else if (filteredQ.length === 0) {
        qSection = `<div class="no-results">해당 필터 조건에 맞는 샘플 발문이 없습니다.</div>`;
    } else {
        qSection = `<div class="q-list">` + filteredQ.map((q, idx) => `
            <div class="q-card ${isSaved(s.code, q) ? "saved" : ""}" data-idx="${idx}">
                ${makeBadge(q.level)}
                <div class="q-body">
                    <span class="q-type">${q.type}</span>
                    <p class="q-text">${q.text}</p>
                </div>
                <button class="btn-add ${isSaved(s.code, q) ? "saved" : ""}" data-idx="${idx}" title="${isSaved(s.code, q) ? "발문함에서 제거" : "발문함에 담기"}">
                    ${isSaved(s.code, q) ? "✓" : "+"}
                </button>
            </div>
        `).join("") + `</div>`;
    }

    el.innerHTML = `
        <div class="content">
            <div class="info-card">
                <div class="info-code-row">
                    <span class="code-chip">${s.code}</span>
                    <span class="domain-chip">${s.domain} 영역</span>
                </div>
                <div class="info-title">${s.title}</div>
                <div class="chip-row">
                    <div class="chip">
                        <span style="font-size:16px">🎯</span>
                        <div><div class="chip-label">평가 요소</div><div class="chip-value">${s.evalElement}</div></div>
                    </div>
                    ${s.evalType.map(t => `
                    <div class="chip">
                        <span style="font-size:16px">📋</span>
                        <div><div class="chip-label">권장 유형</div><div class="chip-value">${t}</div></div>
                    </div>`).join("")}
                </div>
            </div>

            <div>
                <div class="section-header">
                    <span class="section-title">수준별 샘플 발문</span>
                    <div class="section-line"></div>
                    ${!s.isSupport ? `<span class="section-count">${filteredQ.length}개 발견</span>` : ""}
                </div>
                ${qSection}
            </div>

            <div>
                <div class="section-header" style="margin-top:8px">
                    <span class="section-title">성취수준별 상세 기술</span>
                    <div class="section-line"></div>
                </div>
                <div class="level-list">
                    ${displayLevels.map(l => `
                    <div class="level-card">
                        ${makeBadge(l)}
                        <p>${s.levels[l] || ""}</p>
                    </div>`).join("")}
                </div>
            </div>
            <div class="footer-space"></div>
        </div>`;

    // Add button events
    el.querySelectorAll(".btn-add").forEach(btn => {
        btn.addEventListener("click", () => {
            const idx = parseInt(btn.dataset.idx);
            const q = filteredQ[idx];
            const key = makeKey(s.code, q);
            const ei = savedQuestions.findIndex(x => x._key === key);
            if (ei >= 0) savedQuestions.splice(ei, 1);
            else savedQuestions.push({ _key: key, standardCode: s.code, standardTitle: s.title, evalElement: s.evalElement, level: q.level, type: q.type, text: q.text });
            updateCartBadge();
            renderMain();
            if (document.getElementById("cartOverlay").style.display !== "none") renderCart();
        });
    });
}

// ── Full Render ──
function render() {
    renderStdList();
    renderMain();
}

// ── Cart Badge ──
function updateCartBadge() {
    const badge = document.getElementById("cartBadge");
    badge.style.display = savedQuestions.length > 0 ? "flex" : "none";
    badge.textContent = savedQuestions.length;
}

// ── Cart Panel ──
function renderCart() {
    const body = document.getElementById("cartBody");
    const footer = document.getElementById("cartFooter");
    document.getElementById("cartCount").textContent = savedQuestions.length + "개 발문 선택됨";

    if (savedQuestions.length === 0) {
        body.innerHTML = `<div class="cart-empty">
            <div class="ce-icon">📭</div>
            <p>아직 담은 발문이 없어요</p>
            <span>발문 카드의 <strong style="color:#059669">+</strong> 버튼을 눌러보세요</span>
        </div>`;
        footer.style.display = "none";
        return;
    }

    footer.style.display = "flex";
    const grouped = savedQuestions.reduce((acc, q) => {
        if (!acc[q.standardCode]) acc[q.standardCode] = { title: q.standardTitle, evalElement: q.evalElement, items: [] };
        acc[q.standardCode].items.push(q);
        return acc;
    }, {});

    body.innerHTML = Object.entries(grouped).map(([code, data]) => `
        <div class="cart-group">
            <div class="cart-group-head">
                <div class="cart-group-code">${code}</div>
                <div class="cart-group-title">${data.title}</div>
            </div>
            ${data.items.map(q => `
            <div class="cart-q">
                ${makeBadge(q.level)}
                <div class="cart-q-body">
                    <span class="cart-q-type">${q.type}</span>
                    <p class="cart-q-text">${q.text}</p>
                </div>
                <button class="btn-remove" data-key="${q._key.replace(/"/g,'&quot;')}">×</button>
            </div>`).join("")}
        </div>`).join("");

    body.querySelectorAll(".btn-remove").forEach(btn => {
        btn.addEventListener("click", () => {
            savedQuestions = savedQuestions.filter(q => q._key !== btn.dataset.key);
            updateCartBadge();
            renderCart();
            if (selectedCode) renderMain();
        });
    });
}

// ── Download ──
function downloadDoc() {
    const lc = { A:"#e63946", B:"#f4a261", C:"#2a9d8f", D:"#457b9d", E:"#9b72cf" };
    const grouped = savedQuestions.reduce((acc, q) => {
        if (!acc[q.standardCode]) acc[q.standardCode] = { title: q.standardTitle, evalElement: q.evalElement, items: [] };
        acc[q.standardCode].items.push(q);
        return acc;
    }, {});

    let html = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>선택 발문 모음</title>
<style>body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;max-width:800px;margin:40px auto;padding:0 32px;color:#1a1a1a;line-height:1.7}h1{font-size:20px;font-weight:700;color:#1a4a35;border-bottom:3px solid #2d6a4f;padding-bottom:10px;margin-bottom:8px}.meta{font-size:11px;color:#888;margin-bottom:32px}.block{margin-bottom:32px}.sh{background:#f0fdf4;border-left:4px solid #2d6a4f;padding:10px 14px;border-radius:4px;margin-bottom:10px}.sc{font-family:monospace;font-size:11px;font-weight:700;color:#1a6b4a}.st{font-size:14px;font-weight:700;margin-top:3px}.se{font-size:11px;color:#555;margin-top:2px}.q{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-bottom:1px solid #f0f0f0}.q:last-child{border-bottom:none}.lv{font-size:11px;font-weight:700;color:#fff;padding:2px 8px;border-radius:10px;flex-shrink:0;margin-top:2px}.qt{font-size:10px;background:#f3f4f6;color:#555;padding:1px 6px;border-radius:3px;margin-bottom:3px;display:inline-block}.qx{font-size:13px;flex:1}footer{margin-top:48px;padding-top:12px;border-top:1px solid #eee;font-size:10px;color:#bbb}@media print{body{margin:0}}</style>
</head><body>
<h1>📋 선택한 평가 발문 모음</h1>
<div class="meta">2022 개정 영어 성취기준 평가발문기 · 생성일: ${new Date().toLocaleDateString("ko-KR")} · 총 ${savedQuestions.length}개 발문</div>`;

    Object.entries(grouped).forEach(([code, data]) => {
        html += `<div class="block"><div class="sh"><div class="sc">${code}</div><div class="st">${data.title}</div><div class="se">📌 평가 요소: ${data.evalElement}</div></div>`;
        data.items.forEach(q => {
            html += `<div class="q"><span class="lv" style="background:${lc[q.level]}">${q.level}수준</span><div class="qx"><div class="qt">${q.type}</div><br>${q.text}</div></div>`;
        });
        html += `</div>`;
    });
    html += `<footer>* 2022 개정 교육과정 성취기준 기반 샘플 문항입니다.</footer></body></html>`;

    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([html], { type: "text/html;charset=utf-8" }));
    a.download = "평가발문_모음.html";
    a.click();
}

// ── Event Listeners ──
document.getElementById("searchInput").addEventListener("input", e => {
    searchTerm = e.target.value;
    render();
});

document.querySelectorAll("[data-domain]").forEach(btn => {
    btn.addEventListener("click", () => {
        domainFilter = btn.dataset.domain;
        document.querySelectorAll("[data-domain]").forEach(b => b.classList.toggle("active", b === btn));
        render();
    });
});

// Level buttons
const lvConf = [["ALL","전체","#cbd5e1"],["A","A",LC.A],["B","B",LC.B],["C","C",LC.C],["D","D",LC.D],["E","E",LC.E]];
const lvGrid = document.getElementById("levelBtns");
lvConf.forEach(([val, label, color]) => {
    const btn = document.createElement("button");
    btn.className = "level-btn" + (val === "ALL" ? " active" : "");
    btn.dataset.lv = val;
    btn.innerHTML = `<span class="level-dot" style="background:${color}"></span>${label}`;
    btn.addEventListener("click", () => {
        levelFilter = val;
        lvGrid.querySelectorAll(".level-btn").forEach(b => b.classList.toggle("active", b === btn));
        renderMain();
    });
    lvGrid.appendChild(btn);
});

document.getElementById("mobileStdSelect").addEventListener("change", e => {
    selectedCode = e.target.value || null;
    render();
});
document.getElementById("mobileLevelSelect").addEventListener("change", e => {
    levelFilter = e.target.value;
    renderMain();
});

document.getElementById("cartBtn").addEventListener("click", () => {
    document.getElementById("cartOverlay").style.display = "flex";
    renderCart();
});
document.getElementById("cartClose").addEventListener("click", () => {
    document.getElementById("cartOverlay").style.display = "none";
});
document.getElementById("cartOverlay").addEventListener("click", e => {
    if (e.target === document.getElementById("cartOverlay"))
        document.getElementById("cartOverlay").style.display = "none";
});
document.getElementById("downloadBtn").addEventListener("click", downloadDoc);
document.getElementById("clearBtn").addEventListener("click", () => {
    savedQuestions = [];
    updateCartBadge();
    renderCart();
    if (selectedCode) renderMain();
});

// ── Init ──
document.getElementById("totalCount").textContent = "총 " + STANDARDS.length + "개 기준 수록";
render();
</script>
</body>
</html>
