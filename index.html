<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2022 개정 영어 성취기준 평가발문기</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: #f5f0eb; }

        /* scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

        /* ── Layout ── */
        .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ── Header ── */
        .header { background: #065f46; color: #fff; padding: 14px 20px; box-shadow: 0 2px 6px rgba(0,0,0,.15); flex-shrink: 0; }
        .header-inner { max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 8px; }
        .header h1 { font-size: 16px; font-weight: 700; }
        .header p  { font-size: 11px; opacity: .8; margin-top: 2px; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .header-count { font-size: 10px; background: rgba(0,0,0,.25); padding: 3px 8px; border-radius: 4px; color: #d1fae5; }
        .btn-cart {
            position: relative; display: flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
            color: #fff; font-size: 12px; font-weight: 700; padding: 6px 12px;
            border-radius: 8px; cursor: pointer; transition: background .15s;
        }
        .btn-cart:hover { background: rgba(255,255,255,.22); }
        .cart-badge {
            position: absolute; top: -7px; right: -7px;
            background: #facc15; color: #713f12; font-size: 9px; font-weight: 900;
            width: 17px; height: 17px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* ── Body ── */
        .body { display: flex; flex: 1; overflow: hidden; max-width: 1200px; width: 100%; margin: 0 auto; }

        /* ── Sidebar ── */
        .sidebar {
            width: 272px; flex-shrink: 0; background: #fff;
            border-right: 1px solid #e5e7eb; padding: 16px;
            display: flex; flex-direction: column; gap: 14px;
            overflow-y: auto;
        }
        @media (max-width: 768px) { .sidebar { display: none; } }
        .sidebar input {
            width: 100%; padding: 9px 12px; border: 1px solid #d1d5db;
            border-radius: 8px; font-size: 13px; background: #fafaf9;
            outline: none; transition: box-shadow .15s;
        }
        .sidebar input:focus { box-shadow: 0 0 0 2px #6ee7b7; border-color: #6ee7b7; }
        .sidebar-label { font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .07em; padding: 0 4px; margin-bottom: 5px; }
        .filter-btn {
            width: 100%; text-align: left; padding: 7px 12px; border-radius: 8px;
            font-size: 13px; background: transparent; border: none; cursor: pointer;
            color: #4b5563; transition: background .12s;
        }
        .filter-btn:hover { background: #f3f4f6; }
        .filter-btn.active { background: #d1fae5; color: #065f46; font-weight: 700; }
        .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .level-btn {
            display: flex; align-items: center; gap: 6px; padding: 7px 10px;
            border-radius: 8px; font-size: 13px; background: #f9fafb;
            border: none; cursor: pointer; color: #4b5563; transition: all .12s;
        }
        .level-btn:hover { background: #f3f4f6; }
        .level-btn.active { background: #d1fae5; color: #065f46; font-weight: 700; box-shadow: 0 0 0 1px #6ee7b7; }
        .level-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .std-list { flex: 1; overflow-y: auto; }
        .std-btn {
            width: 100%; text-align: left; padding: 9px 10px; border-radius: 8px;
            border: 1px solid transparent; background: transparent;
            cursor: pointer; margin-bottom: 3px; transition: all .12s;
        }
        .std-btn:hover { background: #f9fafb; }
        .std-btn.active { background: #fff; border-color: #059669; box-shadow: 0 0 0 1px #059669; }
        .std-btn-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
        .std-code { font-family: monospace; font-size: 11px; font-weight: 700; color: #059669; }
        .std-cnt { font-size: 9px; padding: 1px 5px; border-radius: 10px; }
        .std-cnt.normal { background: #d1fae5; color: #065f46; }
        .std-cnt.support { background: #ffedd5; color: #9a3412; }
        .std-title-sm { font-size: 11px; color: #6b7280; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* ── Main ── */
        .main { flex: 1; padding: 24px 28px; overflow-y: auto; background: #f5f0eb; }
        @media (max-width: 768px) { .main { padding: 14px; background: #fff; } }

        /* mobile select row */
        .mobile-filters { display: none; gap: 8px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px; }
        @media (max-width: 768px) { .mobile-filters { display: flex; } }
        .mobile-filters select { padding: 7px 10px; background: #fff; border: 1px solid #d1d5db; border-radius: 8px; font-size: 12px; outline: none; }

        /* empty state */
        .empty-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 20px; background: #fff; border-radius: 20px; border: 2px dashed #e5e7eb; }
        .empty-state .icon { font-size: 52px; margin-bottom: 16px; }
        .empty-state h2 { font-size: 18px; font-weight: 700; color: #374151; margin-bottom: 6px; }
        .empty-state p  { font-size: 13px; color: #9ca3af; max-width: 280px; line-height: 1.6; }

        /* content wrapper */
        .content { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

        /* info card */
        .info-card { background: #fff; border-radius: 16px; padding: 20px 22px; box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 1px solid #e5e7eb; }
        .info-code-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .code-chip { background: #065f46; color: #fff; padding: 3px 10px; border-radius: 20px; font-family: monospace; font-size: 11px; font-weight: 700; }
        .domain-chip { font-size: 11px; font-weight: 700; color: #065f46; text-transform: uppercase; letter-spacing: .05em; }
        .info-title { font-size: 18px; font-weight: 700; color: #1f2937; margin-bottom: 14px; line-height: 1.4; }
        .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { display: flex; align-items: center; gap: 6px; background: #f5f0eb; padding: 6px 10px; border-radius: 8px; }
        .chip-label { font-size: 10px; color: #9ca3af; font-weight: 700; line-height: 1; margin-bottom: 2px; }
        .chip-value { font-size: 11px; font-weight: 600; color: #374151; }

        /* section header */
        .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .section-title { font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .08em; white-space: nowrap; }
        .section-line { flex: 1; height: 1px; background: #e5e7eb; }
        .section-count { font-size: 11px; font-weight: 700; color: #059669; background: #ecfdf5; padding: 3px 8px; border-radius: 6px; }

        /* support notice */
        .support-notice { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 16px; padding: 28px; text-align: center; }
        .support-notice p:first-of-type { font-size: 13px; font-weight: 700; color: #9a3412; margin-top: 6px; }
        .support-notice p:last-of-type  { font-size: 11px; color: rgba(154,52,18,.65); margin-top: 4px; }

        /* question card */
        .q-list { display: flex; flex-direction: column; gap: 10px; }
        .q-card {
            background: #fff; border-radius: 16px; border: 1px solid #f3f4f6;
            padding: 16px 18px; display: flex; gap: 14px; align-items: flex-start;
            box-shadow: 0 1px 2px rgba(0,0,0,.04); transition: box-shadow .15s, border-color .15s;
        }
        .q-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.08); }
        .q-card.saved { border-color: #6ee7b7; }
        .badge { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; font-size: 12px; font-weight: 700; font-family: monospace; flex-shrink: 0; }
        .q-body { flex: 1; }
        .q-type { display: inline-block; font-size: 10px; font-weight: 700; background: #f5f0eb; color: #6b7280; padding: 2px 7px; border-radius: 4px; margin-bottom: 6px; }
        .q-text { font-size: 14px; color: #374151; line-height: 1.6; font-weight: 500; }
        .q-card:hover .q-text { color: #064e3b; }
        .btn-add {
            flex-shrink: 0; align-self: center; width: 30px; height: 30px;
            border-radius: 50%; border: 1px solid #e5e7eb; background: #f5f0eb;
            font-size: 15px; font-weight: 700; color: #9ca3af;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all .15s;
        }
        .btn-add:hover { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
        .btn-add.saved { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
        .btn-add.saved:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }

        /* no results */
        .no-results { background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; padding: 28px; text-align: center; font-size: 13px; color: #9ca3af; }

        /* levels section */
        .level-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
        .level-card { background: #fff; border-radius: 16px; border: 1px solid #f3f4f6; padding: 14px 18px; display: flex; gap: 14px; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,.04); }
        .level-card p { font-size: 13px; color: #4b5563; line-height: 1.6; }

        /* footer spacing */
        .footer-space { height: 48px; }

        /* ── Cart Panel ── */
        .cart-overlay {
            position: fixed; inset: 0; z-index: 50;
            display: flex; justify-content: flex-end;
            background: rgba(0,0,0,.28);
        }
        .cart-panel { width: 380px; background: #fff; display: flex; flex-direction: column; height: 100%; box-shadow: -4px 0 20px rgba(0,0,0,.12); }
        @media (max-width: 480px) { .cart-panel { width: 100%; } }
        .cart-header { background: #065f46; color: #fff; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .cart-header h2 { font-size: 14px; font-weight: 700; }
        .cart-header p  { font-size: 11px; opacity: .7; margin-top: 2px; }
        .cart-close { background: none; border: none; color: rgba(255,255,255,.6); font-size: 24px; line-height: 1; cursor: pointer; padding: 0 4px; }
        .cart-close:hover { color: #fff; }
        .cart-body { flex: 1; overflow-y: auto; padding: 14px; }
        .cart-empty { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #9ca3af; padding: 40px 20px; }
        .cart-empty .icon { font-size: 42px; margin-bottom: 10px; }
        .cart-empty p { font-size: 13px; color: #6b7280; font-weight: 600; }
        .cart-empty span { font-size: 12px; color: #9ca3af; margin-top: 4px; display: block; }
        .cart-group { border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
        .cart-group-head { background: #f0fdf4; padding: 9px 14px; border-bottom: 1px solid #d1fae5; }
        .cart-group-code { font-family: monospace; font-size: 11px; font-weight: 700; color: #059669; }
        .cart-group-title { font-size: 11px; color: #6b7280; margin-top: 2px; line-height: 1.4; }
        .cart-q { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; border-bottom: 1px solid #f3f4f6; }
        .cart-q:last-child { border-bottom: none; }
        .cart-q-body { flex: 1; min-width: 0; }
        .cart-q-type { font-size: 10px; font-weight: 700; background: #e5e7eb; color: #6b7280; padding: 1px 6px; border-radius: 3px; display: inline-block; margin-bottom: 4px; }
        .cart-q-text { font-size: 12px; color: #374151; line-height: 1.5; }
        .btn-remove { background: none; border: none; color: #d1d5db; font-size: 18px; line-height: 1; cursor: pointer; flex-shrink: 0; padding: 0 2px; }
        .btn-remove:hover { color: #ef4444; }
        .cart-footer { padding: 14px; border-top: 1px solid #f3f4f6; flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; }
        .btn-download { width: 100%; background: #065f46; color: #fff; border: none; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: background .15s; }
        .btn-download:hover { background: #047857; }
        .btn-clear { width: 100%; background: none; border: none; font-size: 12px; color: #9ca3af; cursor: pointer; padding: 4px; transition: color .15s; }
        .btn-clear:hover { color: #ef4444; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const STANDARDS = [
            // ========== 이해 영역 (01-01 ~ 01-10) ==========
            { 
                code:"9영01-01",

                    {level:"A",type:"수행평가",text:"주어진 문장을 듣고 연음이 일어나는 위치를 표시한 후, 직접 자연스럽게 발음해 보시오."},
                    {level:"B",type:"지필 선택형",text:"다음 대화를 듣고, 빈칸에 들어갈 알맞은 축약형을 고르시오."},
                    {level:"B",type:"지필 서술형",text:"다음 문장을 듣고, 연음이 일어나는 부분을 찾아 표시하시오."},
                    {level:"C",type:"지필 선택형",text:"다음 두 문장을 듣고, 축약형이 사용된 문장을 고르시오."},

                                        </div>
                                    </div>

                                    <div className="footer-space" />
                                </div>
                            )}
                        </main>
                    </div>

                    {/* Cart panel */}
                    {showCart && (
                        <div className="cart-overlay" onClick={() => setShowCart(false)}>
                            <div className="cart-panel" onClick={e => e.stopPropagation()}>
                                <div className="cart-header">
                                    <div>
                                        <h2>📋 내 발문함</h2>
                                        <p>{savedQuestions.length}개 발문 선택됨</p>
                                    </div>
                                    <button className="cart-close" onClick={() => setShowCart(false)}>×</button>
                                </div>

                                <div className="cart-body custom-scrollbar">
                                    {savedQuestions.length === 0 ? (
                                        <div className="cart-empty">
                                            <div className="icon">📭</div>
                                            <p>아직 담은 발문이 없어요</p>
                                            <span>발문 카드의 <strong style={{color:'#059669'}}>+</strong> 버튼을 눌러보세요</span>
                                        </div>
                                    ) : (
                                        Object.entries(
                                            savedQuestions.reduce((acc, q) => {
                                                if (!acc[q.standardCode]) acc[q.standardCode] = { title: q.standardTitle, evalElement: q.evalElement, items: [] };
                                                acc[q.standardCode].items.push(q);
                                                return acc;
                                            }, {})
                                        ).map(([code, data]) => (
                                            <div key={code} className="cart-group">
                                                <div className="cart-group-head">
                                                    <div className="cart-group-code">{code}</div>
                                                    <div className="cart-group-title">{data.title}</div>
                                                </div>
                                                {data.items.map(q => (
                                                    <div key={q._key} className="cart-q">
                                                        <Badge level={q.level} />
                                                        <div className="cart-q-body">
                                                            <span className="cart-q-type">{q.type}</span>
                                                            <p className="cart-q-text">{q.text}</p>
                                                        </div>
                                                        <button className="btn-remove"
                                                            onClick={() => setSavedQuestions(prev => prev.filter(s => s._key !== q._key))}>×</button>
                                                    </div>
                                                ))}
                                            </div>
                                        ))
                                    )}
                                </div>

                                {savedQuestions.length > 0 && (
                                    <div className="cart-footer">
                                        <button className="btn-download" onClick={downloadDoc}>
                                            ⬇️ 문서로 다운로드 (.html)
                                        </button>
                                        <button className="btn-clear" onClick={() => setSavedQuestions([])}>
                                            전체 비우기
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
