  { code:"9영01-04", domain:"이해", title:"친숙한 주제에 관한 담화나 글에서 일이나 사건의 논리적 관계를 파악한다.", evalElement:"순서, 전후 관계, 원인과 결과 등의 논리적 관계 파악하기", evalType:["형성평가","지필 선택형","지필 서술형","수행평가"], questions:[{level:"A",type:"지필 선택형",text:"다음 글 다음에 이어질 내용으로 가장 적절한 것은?"},{level:"B",type:"지필 선택형",text:"주어진 글 다음에 이어질 글의 순서로 가장 적절한 것은?"},{level:"C",type:"지필 선택형",text:"밑줄 친 ⓐ와 같이 말한 이유로 가장 적절한 것은?"},{level:"D",type:"지필 선택형",text:"글의 흐름으로 보아, 주어진 문장이 들어가기에 가장 적절한 곳은?"},{level:"E",type:"지필 선택형",text:"다음 글에서 전체 흐름과 관계 없는 문장은?"}], levels:{A:"논리적 관계를 정확하게 파악할 수 있다.",B:"논리적 관계를 비교적 정확하게 파악할 수 있다.",C:"논리적 관계를 대략적으로 파악할 수 있다.",D:"논리적 관계를 부분적으로 파악할 수 있다.",E:"논리적 관계를 제한적으로 파악할 수 있다."} },
  { code:"9영01-05", domain:"이해", title:"친숙한 주제에 관한 담화나 글에서 인물의 기분이나 감정을 추론한다.", evalElement:"기분이나 감정 추론하기", evalType:["형성평가","지필 선택형","수행평가"], questions:[{level:"A",type:"지필 선택형",text:"다음 글에서 I의 심경 변화로 가장 적절한 것은?"},{level:"B",type:"지필 선택형",text:"다음 글의 분위기로 가장 적절한 것은?"},{level:"C",type:"지필 선택형",text:"다음 대화의 여자의 심정으로 가장 적절한 것은?"},{level:"D",type:"지필 선택형",text:"다음 글에서 Peter가 화가 난 이유로 가장 적절한 것은?"},{level:"E",type:"지필 선택형",text:"다음 대화에서 주인공이 슬픈 이유로 가장 적절한 것은?"}], levels:{A:"인물의 기분이나 감정을 정확하게 추론할 수 있다.",B:"인물의 기분이나 감정을 비교적 정확하게 추론할 수 있다.",C:"인물의 기분이나 감정을 대략적으로 추론할 수 있다.",D:"인물의 기분이나 감정을 부분적으로 추론할 수 있다.",E:"인물의 기분이나 감정을 제한적으로 추론할 수 있다."} },
  { code:"9영01-06", domain:"이해", title:"친숙한 주제에 관한 담화나 글에서 화자나 필자의 의도나 목적을 추론한다.", evalElement:"의도나 목적 추론하기", evalType:["형성평가","지필 선택형","수행평가"], questions:[{level:"A",type:"지필 선택형",text:"다음 광고문의 목적으로 가장 적절한 것은?"},{level:"B",type:"지필 선택형",text:"다음 이메일의 목적으로 가장 적절한 것은?"},{level:"C",type:"지필 선택형",text:"다음 글의 목적으로 가장 적절한 것은?"},{level:"D",type:"지필 선택형",text:"다음 대화의 밑줄 친 ⓐ의 의도로 가장 적절한 것은?"}], levels:{A:"의도나 목적을 정확하게 추론할 수 있다.",B:"의도나 목적을 비교적 정확하게 추론할 수 있다.",C:"의도나 목적을 대략적으로 추론할 수 있다.",D:"의도나 목적을 부분적으로 추론할 수 있다.",E:"의도나 목적을 제한적으로 추론할 수 있다."} },
  { code:"9영02-03", domain:"표현", title:"친숙한 주제에 관해 사실적 정보를 설명한다.", evalElement:"사실적 정보 설명하기, 어휘와 언어형식 활용하기", evalType:["형성평가","지필 선택형","지필 서술형","수행평가"], questions:[{level:"A",type:"지필 선택형",text:"<보기>의 (A)와 (B) 빈칸에 들어갈 말이 적절하게 짝지어진 것은?"},{level:"B",type:"지필 선택형",text:"다음 의미에 해당하는 단어로 적절하지 않은 것은?"},{level:"C",type:"지필 선택형",text:"문맥상 낱말의 쓰임이 적절하지 않은 것은?"},{level:"D",type:"지필 서술형",text:"(문법)을 활용하여 다음 그림을 설명하시오."},{level:"E",type:"지필 서술형",text:"윗글에서 ~의 특징을 서술하시오."}], levels:{A:"사실적 정보를 정확하게 설명할 수 있다.",B:"사실적 정보를 비교적 정확하게 설명할 수 있다.",C:"사실적 정보를 대략적으로 설명할 수 있다.",D:"사실적 정보를 부분적으로 설명할 수 있다.",E:"사실적 정보를 제한적으로 설명할 수 있다."} },
  { code:"9영02-06", domain:"표현", title:"친숙한 주제에 관해 자신의 의견을 주장한다.", evalElement:"의견 주장하기, 어휘와 언어형식 활용하기", evalType:["형성평가","지필 선택형","수행평가"], questions:[{level:"A",type:"지필 선택형",text:"윗글에서 주인공이 주장하고자 하는 내용은?"},{level:"B",type:"지필 선택형",text:"윗글에서 주인공이 의견을 효과적으로 주장하기 위해 사용한 방법은?"},{level:"C",type:"수행평가",text:"글의 주제에 대해 찬성 또는 반대 입장을 설정하고, 자신의 의견을 세 문장으로 작성하시오."}], levels:{A:"자신의 의견을 명확하게 주장할 수 있다.",B:"자신의 의견을 비교적 명확하게 주장할 수 있다.",C:"자신의 의견을 대략적으로 주장할 수 있다.",D:"자신의 의견을 부분적으로 주장할 수 있다.",E:"자신의 의견을 제한적으로 주장할 수 있다."} },
];

const LC={A:"#e63946",B:"#f4a261",C:"#2a9d8f",D:"#457b9d",E:"#9b72cf"};
const LB={A:"#fde8e8",B:"#fef3e2",C:"#e0f4f2",D:"#e2edf5",E:"#f0ebfa"};

function Badge({level}) {
  return <div style={{width:28,height:28,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.78rem",fontWeight:700,background:LB[level],color:LC[level],flexShrink:0,fontFamily:"monospace"}}>{level}</div>;
}

function SecTitle({children}) {
  return <div style={{fontSize:"0.75rem",fontWeight:700,color:"#999",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:10,display:"flex",alignItems:"center",gap:8}}>{children}<span style={{flex:1,height:1,background:"#e0ddd7"}}/></div>;
}

function ApiKeyModal({ onSave, onClose }) {
  const [key, setKey] = useState('');
  return (
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>
      <div style={{background:"#fff",borderRadius:12,padding:24,maxWidth:420,width:"90%",boxShadow:"0 10px 40px rgba(0,0,0,0.2)"}}>
        <h3 style={{marginBottom:12,fontSize:"1.1rem",color:"#2d6a4f"}}>🔑 Groq API Key 설정</h3>
        <p style={{fontSize:"0.84rem",color:"#666",marginBottom:16,lineHeight:1.6}}>
          AI 발문 생성을 위해 Groq API Key가 필요합니다.<br/>
          <a href="https://console.groq.com/keys" target="_blank" style={{color:"#2d6a4f"}}>Groq Console</a>에서 무료로 발급받을 수 있습니다.
        </p>
        <input 
          type="password" 
          value={key} 
          onChange={e=>setKey(e.target.value)}
          placeholder="API Key를 입력하세요"
          style={{width:"100%",padding:"10px 14px",border:"1.5px solid #ddd",borderRadius:8,fontSize:"0.9rem",marginBottom:16,boxSizing:"border-box"}}
        />
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={{padding:"8px 16px",border:"1px solid #ddd",borderRadius:8,background:"#fff",cursor:"pointer",fontSize:"0.84rem"}}>취소</button>
          <button onClick={()=>{if(key.trim()){onSave(key.trim());onClose();}}} style={{padding:"8px 16px",border:"none",borderRadius:8,background:"#2d6a4f",color:"#fff",cursor:"pointer",fontSize:"0.84rem",fontWeight:600}}>저장</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [code, setCode] = useState(null);
  const [lv, setLv] = useState("ALL");
  const [domain, setDomain] = useState("ALL");
  const [q, setQ] = useState("");
  const [aiLv, setAiLv] = useState("C");
  const [aiType, setAiType] = useState("지필 선택형");
  const [aiN, setAiN] = useState("3");
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState([]);
  const [err, setErr] = useState("");
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('groq_api_key') || '');
  const [showModal, setShowModal] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const filtered = STANDARDS.filter(s =>
    (domain==="ALL"||s.domain===domain) &&
    (!q||s.code.includes(q)||s.title.includes(q)||s.evalElement.includes(q))
  );
  const std = STANDARDS.find(s=>s.code===code);
  const dispLvs = lv==="ALL"?["A","B","C","D","E"]:[lv];
  const filtQs = std ? std.questions.filter(q=>lv==="ALL"||q.level===lv) : [];

  const saveApiKey = (key) => {
    setApiKey(key);
    localStorage.setItem('groq_api_key', key);
  };

  async function generate() {
    if(!std) return;
    if(!apiKey) {
      setShowModal(true);
      return;
    }
    setLoading(true); setResults([]); setErr("");
    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body:JSON.stringify({
          model:"llama-3.1-70b-versatile",
          messages:[{
            role:"user",
            content:`한국 중학교 영어 교사입니다. 2022 개정 교육과정 성취기준에 맞는 평가 발문을 생성해주세요.

성취기준: ${std.title} (${std.code})
평가 요소: ${std.evalElement}
성취수준: ${aiLv} / 성취수준 기술: ${std.levels[aiLv]}
평가 유형: ${aiType}
생성할 발문 수: ${aiN}개

조건: 실제 시험 발문 형태, 성취수준 난이도 반영, 한국 중학교 형식 준수.
각 발문을 줄바꿈으로만 구분하여 발문 텍스트만 출력하세요 (번호, 설명 없이).`
          }],
          max_tokens: 1000
        })
      });
      const data = await res.json();
      if(data.error) {
        throw new Error(data.error.message || "API 오류");
      }
      const text = data.choices?.[0]?.message?.content || "";
      setResults(text.split("\n").map(l=>l.trim()).filter(l=>l.length>5));
    } catch(e) {
      setErr("생성 중 오류: " + (e.message || "알 수 없는 오류"));
    } finally { setLoading(false); }
  }

  const SideBtn = ({active, onClick, children}) => (
    <button onClick={onClick} style={{display:"block",width:"100%",padding:"7px 11px",marginBottom:4,border:"none",borderRadius:8,cursor:"pointer",textAlign:"left",fontSize:"0.82rem",fontFamily:"inherit",background:active?"#d8f3dc":"transparent",color:active?"#2d6a4f":"#555",fontWeight:active?600:400}}>
      {children}
    </button>
  );

  return (
    <div style={{fontFamily:"system-ui,sans-serif",background:"#f5f3ee",minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      {showModal && <ApiKeyModal onSave={saveApiKey} onClose={()=>setShowModal(false)} />}
      
      <div style={{background:"#2d6a4f",color:"white",padding:"14px 22px",position:"sticky",top:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontWeight:700,fontSize:"0.98rem",display:"flex",alignItems:"center",gap:10}}>
            <button onClick={()=>setSidebarOpen(!sidebarOpen)} style={{display:"none",background:"none",border:"none",color:"white",fontSize:"1.3rem",cursor:"pointer",padding:0}} className="mobile-menu">☰</button>
            2022 개정 영어 성취기준 평가발문기
          </div>
          <div style={{fontSize:"0.72rem",opacity:0.8,marginTop:2}}>중학교 · 성취기준별 문항 조회 및 Groq AI 발문 생성</div>
        </div>
        <button onClick={()=>setShowModal(true)} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:6,padding:"6px 12px",color:"white",fontSize:"0.75rem",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
          🔑 {apiKey ? "API Key 변경" : "API Key 설정"}
        </button>
      </div>

      <div style={{display:"flex",flex:1,overflow:"hidden"}}>
        {/* 사이드바 */}
        <div style={{width:255,background:"#fff",borderRight:"1px solid #ddd",padding:"16px 13px",overflowY:"auto",flexShrink:0}} className="sidebar">
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="성취기준 검색..."
            style={{width:"100%",padding:"8px 11px",border:"1.5px solid #ddd",borderRadius:8,fontSize:"0.82rem",fontFamily:"inherit",outline:"none",background:"#f5f3ee",marginBottom:14,boxSizing:"border-box"}}/>

          <div style={{fontSize:"0.67rem",fontWeight:700,color:"#aaa",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:7}}>영역</div>
          {[["ALL","전체"],["이해","이해 (듣기/읽기)"],["표현","표현 (말하기/쓰기)"]].map(([v,l])=>(
            <SideBtn key={v} active={domain===v} onClick={()=>setDomain(v)}>{l}</SideBtn>
          ))}

          <div style={{fontSize:"0.67rem",fontWeight:700,color:"#aaa",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:7,marginTop:14}}>성취수준</div>
          {[["ALL","전체"],["A","A수준"],["B","B수준"],["C","C수준"],["D","D수준"],["E","E수준"]].map(([v,l])=>(
            <button key={v} onClick={()=>setLv(v)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 11px",marginBottom:4,border:"none",borderRadius:8,cursor:"pointer",textAlign:"left",fontSize:"0.82rem",fontFamily:"inherit",background:lv===v?"#d8f3dc":"transparent",color:lv===v?"#2d6a4f":"#555",fontWeight:lv===v?600:400}}>
              <span style={{width:9,height:9,borderRadius:"50%",background:v==="ALL"?"#ccc":LC[v],flexShrink:0}}/>
              {l}
            </button>
          ))}

          <div style={{fontSize:"0.67rem",fontWeight:700,color:"#aaa",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:7,marginTop:14}}>성취기준</div>
          {filtered.length===0&&<div style={{fontSize:"0.79rem",color:"#bbb",textAlign:"center",padding:10}}>없음</div>}
          {filtered.map(s=>(
            <button key={s.code} onClick={()=>{setCode(s.code);setResults([]);setErr("");setSidebarOpen(false);}}
              style={{display:"block",width:"100%",padding:"8px 10px",marginBottom:4,border:"none",borderRadius:8,cursor:"pointer",textAlign:"left",fontFamily:"inherit",background:code===s.code?"#d8f3dc":"transparent",color:code===s.code?"#2d6a4f":"#555"}}>
              <span style={{fontFamily:"monospace",fontSize:"0.71rem",fontWeight:600,display:"block",marginBottom:2}}>{s.code}</span>
              <span style={{fontSize:"0.77rem",lineHeight:1.4}}>{s.title}</span>
            </button>
          ))}
        </div>

        {/* 메인 */}
        <div style={{flex:1,padding:"22px 26px",overflowY:"auto"}}>
          {!std ? (
            <div style={{textAlign:"center",padding:"70px 20px",color:"#bbb"}}>
              <div style={{fontSize:"2.5rem",marginBottom:12}}>👈</div>
              <div style={{fontSize:"1.05rem",color:"#888",marginBottom:8}}>성취기준을 선택하세요</div>
              <div style={{fontSize:"0.84rem",lineHeight:1.8}}>왼쪽에서 성취기준을 선택하면<br/>성취수준별 발문 확인 및<br/>Groq AI 발문 생성이 가능합니다.</div>
              {!apiKey && (
                <button onClick={()=>setShowModal(true)} style={{marginTop:20,padding:"10px 20px",background:"#2d6a4f",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontSize:"0.9rem"}}>
                  🔑 먼저 API Key를 설정하세요
                </button>
              )}
            </div>
          ) : (<>
            <div style={{background:"#fff",borderRadius:10,padding:20,marginBottom:18,border:"1px solid #ddd"}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:10}}>
                <span style={{background:"#d8f3dc",color:"#2d6a4f",padding:"4px 10px",borderRadius:6,fontFamily:"monospace",fontSize:"0.82rem",fontWeight:600,whiteSpace:"nowrap"}}>{std.code}</span>
                <span style={{fontSize:"0.97rem",fontWeight:600,lineHeight:1.5}}>{std.title}</span>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                <span style={{fontSize:"0.72rem",padding:"3px 10px",borderRadius:20,background:"#f0ede6",color:"#777"}}>🎯 {std.evalElement}</span>
                {std.evalType.map(t=><span key={t} style={{fontSize:"0.72rem",padding:"3px 10px",borderRadius:20,background:"#f0ede6",color:"#777"}}>📋 {t}</span>)}
              </div>
            </div>

            <SecTitle>샘플 발문</SecTitle>
            <div style={{marginBottom:20}}>
              {filtQs.length===0
                ? <div style={{textAlign:"center",padding:24,color:"#bbb",fontSize:"0.84rem",background:"#fff",borderRadius:10,border:"1px solid #ddd"}}>이 성취기준은 다른 성취기준과 연계하여 평가합니다. AI 생성을 활용해보세요.</div>
                : filtQs.map((q,i)=>(
                  <div key={i} style={{background:"#fff",borderRadius:10,border:"1px solid #ddd",padding:"13px 16px",marginBottom:8,display:"flex",gap:12,alignItems:"flex-start"}}>
                    <Badge level={q.level}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:"0.67rem",padding:"2px 8px",borderRadius:4,background:"#f0ede6",color:"#888",display:"inline-block",marginBottom:6}}>{q.type}</div>
                      <div style={{fontSize:"0.88rem",lineHeight:1.6,marginBottom:7}}>{q.text}</div>
                      <div style={{fontSize:"0.76rem",color:"#999",lineHeight:1.5,padding:"6px 10px",background:"#f5f3ee",borderRadius:6}}>{std.levels[q.level]}</div>
                    </div>
                  </div>
                ))
              }
            </div>

            <SecTitle>성취수준별 기술</SecTitle>
            <div style={{marginBottom:20}}>
              {dispLvs.map(l=>(
                <div key={l} style={{background:"#fff",borderRadius:10,border:"1px solid #ddd",padding:"13px 16px",marginBottom:8,display:"flex",gap:12,alignItems:"flex-start"}}>
                  <Badge level={l}/>
                  <div style={{fontSize:"0.87rem",lineHeight:1.6}}>{std.levels[l]}</div>
                </div>
              ))}
            </div>

            <SecTitle>✨ AI 발문 생성 (Groq)</SecTitle>
            <div style={{background:"#fff",borderRadius:10,border:"1px solid #ddd",padding:20}}>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
                {[
                  [aiLv,setAiLv,[["A","A수준"],["B","B수준"],["C","C수준"],["D","D수준"],["E","E수준"]]],
                  [aiType,setAiType,[["지필 선택형","지필 선택형"],["지필 서술형","지필 서술형"],["수행평가 구술형","수행평가 구술형"],["수행평가 서논술형","수행평가 서논술형"],["형성평가","형성평가"]]],
                  [aiN,setAiN,[["3","3개"],["5","5개"],["10","10개"]]],
                ].map(([val,setter,opts],i)=>(
                  <select key={i} value={val} onChange={e=>setter(e.target.value)}
                    style={{padding:"8px 11px",border:"1.5px solid #ddd",borderRadius:8,fontFamily:"inherit",fontSize:"0.82rem",background:"#f5f3ee",outline:"none",cursor:"pointer"}}>
                    {opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
                  </select>
                ))}
                <button onClick={generate} disabled={loading}
                  style={{padding:"8px 18px",background:loading?"#aaa":"#2d6a4f",color:"white",border:"none",borderRadius:8,fontFamily:"inherit",fontSize:"0.84rem",fontWeight:600,cursor:loading?"not-allowed":"pointer"}}>
                  {loading?"⏳ 생성 중...":"✨ 발문 생성"}
                </button>
              </div>
              {!apiKey && <div style={{color:"#f4a261",fontSize:"0.82rem",padding:"9px 13px",background:"#fef3e2",borderRadius:8,marginBottom:10}}>⚠️ API Key를 먼저 설정해주세요.</div>}
              {err&&<div style={{color:"#e63946",fontSize:"0.82rem",padding:"9px 13px",background:"#fde8e8",borderRadius:8,marginBottom:10}}>{err}</div>}
              {results.length>0&&(
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {results.map((r,i)=>(
                    <div key={i} style={{background:"#d8f3dc",border:"1px solid #b7e4c7",borderRadius:8,padding:"12px 15px",display:"flex",alignItems:"flex-start",gap:10}}>
                      <span style={{fontSize:"0.65rem",fontWeight:700,background:"#2d6a4f",color:"white",padding:"3px 7px",borderRadius:4,whiteSpace:"nowrap"}}>AI·{aiLv}</span>
                      <span style={{fontSize:"0.87rem",lineHeight:1.6,flex:1}}>{r}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </>)}
        </div>
      </div>

      <style>{`
        @media (max-width: 768px) {
          .sidebar { 
            position: fixed !important; 
            left: ${sidebarOpen ? '0' : '-280px'} !important; 
            top: 60px !important; 
            bottom: 0 !important; 
            z-index: 99 !important;
            transition: left 0.3s ease !important;
            width: 280px !important;
          }
          .mobile-menu { display: block !important; }
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
